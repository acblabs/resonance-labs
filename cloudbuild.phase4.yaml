substitutions:
  _PRIVATE_GCS_BUCKET: private-bucket-placeholder
  _PRIVATE_INPUT_PREFIX: phase4/datasets/current
  _FINALIZE_DATASET: "false"
  _PRIVATE_INBOX_PREFIX: phase4/inbox
  _PRIVATE_SNAPSHOT_PREFIX: phase4/datasets/finalized
  _DATASET_ID: phase4-private
  _PRIVATE_OUTPUT_PREFIX: phase4/runs
  _MANIFEST_FILE: manifest.json
  _RUN_EXTRACTION: "true"
  _MODEL_FAMILY: linear
  _HOLDOUT_FRACTION: "0.2"
  _RANDOM_STATE: "17"
  _REPEATED_HOLDOUTS: "5"
  _MIN_ALIGNMENT_CONFIDENCE: "0.20"
  _MIN_SNR_DB: "12.0"

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: download-private-phase4-inputs
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_PRIVATE_GCS_BUCKET}" = "private-bucket-placeholder" ]; then
          echo "Set _PRIVATE_GCS_BUCKET in a private Cloud Build trigger or manual build."
          exit 1
        fi
        if [ "${_RUN_EXTRACTION}" != "true" ] && [ "${_RUN_EXTRACTION}" != "false" ]; then
          echo "_RUN_EXTRACTION must be true or false."
          exit 1
        fi
        if [ "${_FINALIZE_DATASET}" != "true" ] && [ "${_FINALIZE_DATASET}" != "false" ]; then
          echo "_FINALIZE_DATASET must be true or false."
          exit 1
        fi

        mkdir -p /workspace/private/phase4/input
        if [ "${_FINALIZE_DATASET}" = "true" ]; then
          mkdir -p /workspace/private/phase4/inbox
          gcloud storage rsync --recursive \
            "gs://${_PRIVATE_GCS_BUCKET}/${_PRIVATE_INBOX_PREFIX}" \
            /workspace/private/phase4/inbox
        else
          gcloud storage rsync --recursive \
            "gs://${_PRIVATE_GCS_BUCKET}/${_PRIVATE_INPUT_PREFIX}" \
            /workspace/private/phase4/input
          test -f "/workspace/private/phase4/input/${_MANIFEST_FILE}"
        fi

  - id: train-and-benchmark-private-phase4
    name: python:3.13-slim
    entrypoint: bash
    args:
      - -c
      - |
        python -m pip install --upgrade pip
        python -m pip install -r requirements-dev.txt

        if [ "${_FINALIZE_DATASET}" = "true" ]; then
          python scripts/build_phase4_manifest.py \
            --inbox-dir /workspace/private/phase4/inbox \
            --snapshot-dir /workspace/private/phase4/input \
            --dataset-id "${_DATASET_ID}-$BUILD_ID" \
            --manifest-name "${_MANIFEST_FILE}" \
            --overwrite
        fi

        if [ "${_RUN_EXTRACTION}" = "true" ]; then
          python scripts/extract_phase4_features.py \
            --manifest "/workspace/private/phase4/input/${_MANIFEST_FILE}" \
            --output-dir /workspace/private/phase4/output/features \
            --manifest-output /workspace/private/phase4/output/manifest.features.json \
            --overwrite
          PHASE4_MANIFEST=/workspace/private/phase4/output/manifest.features.json
        else
          PHASE4_MANIFEST="/workspace/private/phase4/input/${_MANIFEST_FILE}"
        fi

        python scripts/train_baseline.py \
          --manifest "$${PHASE4_MANIFEST}" \
          --output-dir /workspace/private/phase4/output/model \
          --model-family "${_MODEL_FAMILY}" \
          --group-by session_id \
          --holdout-fraction "${_HOLDOUT_FRACTION}" \
          --random-state "${_RANDOM_STATE}" \
          --repeated-holdouts "${_REPEATED_HOLDOUTS}" \
          --min-alignment-confidence "${_MIN_ALIGNMENT_CONFIDENCE}" \
          --min-snr-db "${_MIN_SNR_DB}"

        python scripts/run_phase4_benchmark.py \
          --manifest "$${PHASE4_MANIFEST}" \
          --output-dir /workspace/private/phase4/output/benchmark \
          --model-family "${_MODEL_FAMILY}" \
          --holdout-fraction "${_HOLDOUT_FRACTION}" \
          --random-state "${_RANDOM_STATE}" \
          --repeated-holdouts "${_REPEATED_HOLDOUTS}" \
          --min-alignment-confidence "${_MIN_ALIGNMENT_CONFIDENCE}" \
          --min-snr-db "${_MIN_SNR_DB}"

  - id: upload-private-phase4-outputs
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        if [ "${_FINALIZE_DATASET}" = "true" ]; then
          gcloud storage cp --recursive \
            /workspace/private/phase4/input \
            "gs://${_PRIVATE_GCS_BUCKET}/${_PRIVATE_SNAPSHOT_PREFIX}/$BUILD_ID"
        fi
        gcloud storage cp --recursive \
          /workspace/private/phase4/output \
          "gs://${_PRIVATE_GCS_BUCKET}/${_PRIVATE_OUTPUT_PREFIX}/$BUILD_ID"
